<!DOCTYPE html>
<html>
<head>
  <style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

#chatbox {
  width: 400px;
  background: white;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

#chat {
  height: 350px;
  overflow-y: auto;
  padding: 10px;
  border-radius: 10px;
  background: #f9f9f9;
  margin-bottom: 10px;
}

/* burbujas */
.msg-user {
  background: #667eea;
  color: white;
  padding: 10px;
  border-radius: 15px;
  margin: 5px 0;
  text-align: right;
}

.msg-bot {
  background: #e4e6eb;
  padding: 10px;
  border-radius: 15px;
  margin: 5px 0;
}

/* input */
#input-area {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 20px;
  background: #667eea;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #5a67d8;
}

#clear-btn {
  width: 100%;
  margin-top: 10px;
  background: #ff6b6b;
}
</style>
</head>
<body>

<div id="chatbox">
  <h3>Asistente 🤖</h3>

  <div id="chat"></div>

  <div id="input-area">
    <input id="msg" placeholder="Escribe tu mensaje..." onkeypress="handleKeyPress(event)">
    <button onclick="send()">Enviar</button>
  </div>
  <button id="clear-btn" onclick="clearChat()">Limpiar Chat</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  loadChat();

  if (!localStorage.getItem("chat")) {
    addMessage("Bot", "Hola 👋 ¿En qué puedo ayudarte?", "bot");
    saveChat();
  }
});

function handleKeyPress(event) {
  if (event.key === "Enter") {
    send();
  }
}

async function send() {
  let msg = document.getElementById("msg").value.trim();
  if (!msg) return;

  addMessage("Tú", msg, "user");

  document.getElementById("msg").value = "";

  showTyping(); // 👈 aparece "escribiendo"

  let res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message: msg})
  });

  let data = await res.json();

  removeTyping(); // 👈 desaparece

  addMessage("Bot", data.reply, "bot");

}

function addMessage(sender, text, type) {
  let chat = document.getElementById("chat");

  let msgDiv = document.createElement("div");
  msgDiv.className = type === "user" ? "msg-user" : "msg-bot";

  msgDiv.innerHTML = text.replace(/\n/g, "<br>");

  chat.appendChild(msgDiv);

  chat.scrollTop = chat.scrollHeight;
}

function clearChat() {
  document.getElementById("chat").innerHTML = "";
  addMessage("Bot", "Chat limpiado. ¿En qué puedo ayudarte?", "bot");
function showTyping() {
  let chat = document.getElementById("chat");

  let typing = document.createElement("div");
  typing.className = "msg-bot";
  typing.id = "typing";

  typing.innerHTML = "Escribiendo... ⏳";

  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  let typing = document.getElementById("typing");
  if (typing) typing.remove();
}

function saveChat() {
  localStorage.setItem("chat", document.getElementById("chat").innerHTML);
}

function loadChat() {
  let saved = localStorage.getItem("chat");
  if (saved) {
    document.getElementById("chat").innerHTML = saved;
  }
}

}
</script>

</body>
</html>
