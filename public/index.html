<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Asistente</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    #chatbox {
      width: 400px;
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    #chat {
      height: 350px;
      overflow-y: auto;
      padding: 10px;
      border-radius: 10px;
      background: #f9f9f9;
      margin-bottom: 10px;
    }

    .msg-user {
      background: #667eea;
      color: white;
      padding: 8px 12px;
      border-radius: 15px;
      margin: 5px 0;
      text-align: right;
    }

    .msg-bot {
      background: #e4e6eb;
      padding: 8px 12px;
      border-radius: 15px;
      margin: 5px 0;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 20px;
      background: #667eea;
      color: white;
      cursor: pointer;
    }

    #clear-btn {
      width: 100%;
      margin-top: 10px;
      background: #ff6b6b;
    }
  </style>
</head>

<body>

<div id="chatbox">
  <h3>Asistente 🤖</h3>

  <div id="chat"></div>

  <div class="input-area">
    <input id="msg" placeholder="Escribe tu mensaje..." onkeypress="handleKeyPress(event)">
    <button onclick="send()">Enviar</button>
  </div>

  <button id="clear-btn" onclick="clearChat()">Limpiar Chat</button>
</div>

<script>
window.onload = function() {
  addMessage("Bot", "Hola 👋 ¿En qué puedo ayudarte? Escribe: cursos, pdf, redes o comprar", "bot");
};

function handleKeyPress(event) {
  if (event.key === "Enter") send();
}

async function send() {
  let msg = document.getElementById("msg").value.trim();
  if (!msg) return;

  addMessage("Tú", msg, "user");

  try {
    let res = await fetch("https://asistente-empresa-production.up.railway.app/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message: msg})
    });

    let data = await res.json();
    addMessage("Bot", data.reply, "bot");

  } catch (error) {
    addMessage("Bot", "⚠️ Error conectando con el servidor", "bot");
  }

  document.getElementById("msg").value = "";
}

function addMessage(sender, text, type) {
  let chat = document.getElementById("chat");

  let div = document.createElement("div");
  div.className = type === "user" ? "msg-user" : "msg-bot";

  div.innerHTML = "<b>" + sender + ":</b> " + text.replace(/\n/g, "<br>");

  chat.appendChild(div);
}

function clearChat() {
  document.getElementById("chat").innerHTML = "";
  addMessage("Bot", "Chat limpiado. ¿En qué puedo ayudarte?", "bot");
}
</script>

</body>
</html>
